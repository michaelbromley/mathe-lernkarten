<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mathe Lernkarten – 2CD</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ─── Reset & base ───────────────────────────────────────────── */
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f0e8;
  --accent: #e8522a;
  --navy: #1a2744;
  --muted: #7a7060;
  --white: #ffffff;
  --nav-h: 56px;
  --toc-w: 230px;
}

html, body { height: 100%; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--navy);
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(26,39,68,0.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(26,39,68,0.035) 1px, transparent 1px);
  background-size: 32px 32px;
  pointer-events: none; z-index: 0;
}

/* ─── Top nav ────────────────────────────────────────────────── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--nav-h);
  background: var(--navy);
  display: flex; align-items: center;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,0.18);
}
.topbar-brand {
  font-family: 'Fraunces', serif;
  font-weight: 900; font-size: 1.05rem;
  color: var(--bg); padding: 0 1.2rem;
  white-space: nowrap; flex-shrink: 0;
}
.topbar-brand span { color: var(--accent); }

.tab-btn {
  height: var(--nav-h); padding: 0 1.3rem;
  border: none; background: none;
  color: rgba(245,240,232,0.55);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem; font-weight: 600;
  letter-spacing: 0.04em; cursor: pointer;
  position: relative; transition: color 0.15s;
  white-space: nowrap;
}
.tab-btn::after {
  content: '';
  position: absolute; bottom: 0; left: 1rem; right: 1rem;
  height: 3px; border-radius: 3px 3px 0 0;
  background: var(--accent);
  transform: scaleX(0); transition: transform 0.2s;
}
.tab-btn:hover { color: var(--bg); }
.tab-btn.active { color: var(--bg); }
.tab-btn.active::after { transform: scaleX(1); }

.toc-toggle {
  margin-left: auto; height: var(--nav-h);
  padding: 0 1.2rem; border: none; background: none;
  color: rgba(245,240,232,0.6);
  font-size: 0.8rem; font-weight: 600;
  letter-spacing: 0.06em; text-transform: uppercase;
  cursor: pointer; display: flex; align-items: center; gap: 0.4rem;
  transition: color 0.15s; flex-shrink: 0;
}
.toc-toggle:hover { color: var(--bg); }
.toc-toggle svg { transition: transform 0.25s; }
.toc-toggle.open svg { transform: rotate(180deg); }

.nav-score {
  background: rgba(255,255,255,0.1); border-radius: 20px;
  padding: 0.2rem 0.7rem; font-size: 0.75rem; font-weight: 700;
  color: var(--bg); margin-right: 0.5rem;
  white-space: nowrap; flex-shrink: 0;
}

/* ─── TOC sidebar ────────────────────────────────────────────── */
.toc-sidebar {
  position: fixed; top: var(--nav-h); right: 0;
  width: var(--toc-w);
  height: calc(100vh - var(--nav-h));
  background: var(--white);
  border-left: 2px solid rgba(26,39,68,0.08);
  overflow-y: auto;
  transform: translateX(100%);
  transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
  z-index: 90; padding: 1.2rem 0;
  box-shadow: -4px 0 24px rgba(26,39,68,0.10);
}
.toc-sidebar.open { transform: translateX(0); }

.toc-head {
  font-size: 0.62rem; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--muted); padding: 0 1.2rem 0.6rem;
  border-bottom: 1px solid rgba(26,39,68,0.08);
  margin-bottom: 0.6rem;
}
.toc-group-label {
  font-size: 0.65rem; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 0.8rem 1.2rem 0.3rem;
  display: flex; align-items: center; gap: 0.5rem;
}
.toc-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.toc-item {
  display: block; width: 100%;
  padding: 0.38rem 1.2rem 0.38rem 2rem;
  font-size: 0.8rem; color: var(--navy);
  background: none; border: none;
  text-align: left; cursor: pointer;
  transition: background 0.12s, color 0.12s; line-height: 1.3;
}
.toc-item:hover { background: #f0ece2; color: var(--accent); }

/* ─── Pages ──────────────────────────────────────────────────── */
.page {
  display: none;
  padding: calc(var(--nav-h) + 2rem) 1.5rem 5rem;
  min-height: 100vh;
  position: relative; z-index: 1;
  transition: margin-right 0.28s;
}
.page.active { display: block; }
.page.toc-open { margin-right: var(--toc-w); }

.page-inner { max-width: 1060px; margin: 0 auto; }

.page-header { text-align: center; margin-bottom: 2.5rem; }
.page-header .badge {
  display: inline-block; background: var(--accent); color: white;
  font-size: 0.65rem; font-weight: 700;
  letter-spacing: 0.15em; text-transform: uppercase;
  padding: 0.25rem 0.75rem; border-radius: 2px; margin-bottom: 0.7rem;
}
.page-header h2 {
  font-family: 'Fraunces', serif;
  font-size: clamp(1.6rem, 4vw, 2.6rem);
  font-weight: 900; line-height: 1.1;
}
.page-header h2 span { color: var(--accent); }
.page-header p { color: var(--muted); margin-top: 0.4rem; font-size: 0.88rem; }

/* ─── Flashcard sections ─────────────────────────────────────── */
.fc-section { margin-bottom: 2.8rem; }

.section-title {
  font-family: 'Fraunces', serif;
  font-size: 1.05rem; font-weight: 700;
  margin-bottom: 1rem; padding-bottom: 0.45rem;
  border-bottom: 2px solid var(--navy);
  display: flex; align-items: center; gap: 0.5rem;
}
.section-title .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

.cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
  gap: 1.2rem;
}

/* flip card */
.card-wrap { min-height: 210px; perspective: 1200px; cursor: pointer; }
.card-inner {
  width: 100%; min-height: 210px; position: relative;
  transform-style: preserve-3d;
  transition: transform 0.5s cubic-bezier(0.4,0,0.2,1);
}
.card-wrap.flipped .card-inner { transform: rotateY(180deg); }

.card-front, .card-back {
  width: 100%; border-radius: 12px;
  backface-visibility: hidden; -webkit-backface-visibility: hidden;
  padding: 1.4rem; display: flex; flex-direction: column; justify-content: center;
}
.card-front {
  position: relative; min-height: 210px;
  color: var(--bg); box-shadow: 4px 6px 22px rgba(26,39,68,0.17);
}
.card-back {
  position: absolute; top: 0; left: 0; right: 0; min-height: 100%;
  background: var(--white); color: var(--navy);
  transform: rotateY(180deg);
  box-shadow: 4px 6px 22px rgba(26,39,68,0.1);
  border: 2px solid rgba(26,39,68,0.07);
  overflow-y: auto; justify-content: flex-start;
}

.card-tag {
  font-size: 0.6rem; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  opacity: 0.5; margin-bottom: 0.55rem;
}
.card-question {
  font-family: 'Fraunces', serif;
  font-size: 1.05rem; font-weight: 700; line-height: 1.35;
}
.card-hint { margin-top: auto; font-size: 0.7rem; opacity: 0.35; letter-spacing: 0.06em; }

.card-answer-label {
  font-size: 0.6rem; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  margin-bottom: 0.45rem;
}
.card-answer { font-size: 0.88rem; line-height: 1.55; }
.card-answer strong {
  display: block; font-family: 'Fraunces', serif;
  font-size: 1rem; font-weight: 700; margin-bottom: 0.25rem;
}

/* formula block (rendered from <f>…</f> shorthand) */
.formula {
  font-family: 'Fraunces', serif; font-size: 1.1rem; font-weight: 700;
  background: #f0ece2;
  padding: 0.35rem 0.7rem; margin: 0.35rem 0;
  border-radius: 0 6px 6px 0; display: inline-block;
  border-left: 3px solid var(--accent); /* overridden per-section below */
}

/* progress strip */
.progress-strip {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 80;
  background: var(--white); border-top: 1px solid rgba(26,39,68,0.09);
  padding: 0.65rem 1.5rem;
  display: flex; align-items: center; gap: 1rem;
  font-size: 0.78rem; color: var(--muted);
}
.progress-track {
  flex: 1; height: 4px; background: #e0dbd0;
  border-radius: 2px; overflow: hidden;
}
.progress-fill {
  height: 100%; background: var(--accent); border-radius: 2px;
  transition: width 0.35s ease;
}

/* ─── Exercises ──────────────────────────────────────────────── */
.ex-score-bar {
  display: flex; align-items: center; gap: 1rem;
  margin-bottom: 1.5rem; font-size: 0.85rem; color: var(--muted);
}
.ex-score-val {
  font-family: 'Fraunces', serif;
  font-size: 1.5rem; font-weight: 900; color: var(--navy);
}

.ex-card {
  background: var(--white); border-radius: 14px;
  box-shadow: 4px 6px 22px rgba(26,39,68,0.09);
  border: 2px solid rgba(26,39,68,0.06);
  overflow: hidden; margin-bottom: 1.4rem;
}
.ex-header {
  background: var(--navy); color: var(--bg);
  padding: 0.9rem 1.3rem; display: flex; align-items: center; gap: 0.9rem;
}
.ex-num {
  font-family: 'Fraunces', serif;
  font-size: 1.4rem; font-weight: 900; color: var(--accent);
  line-height: 1; min-width: 1.8rem;
}
.ex-title { font-family: 'Fraunces', serif; font-size: 0.95rem; font-weight: 700; }
.ex-find {
  margin-left: auto; background: var(--accent); color: white;
  font-size: 0.65rem; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 0.25rem 0.6rem; border-radius: 4px; white-space: nowrap;
}

.ex-body {
  padding: 1.1rem 1.3rem;
  display: grid; grid-template-columns: auto 1fr;
  gap: 1.1rem; align-items: center;
}
.ex-diagram svg { display: block; }

.ex-givens { display: flex; flex-wrap: wrap; gap: 0.45rem; margin-bottom: 0.9rem; }
.ex-given-pill {
  background: #f0ece2; border: 1.5px solid rgba(26,39,68,0.1);
  border-radius: 20px; padding: 0.22rem 0.65rem;
  font-size: 0.8rem; font-weight: 600; font-family: 'Fraunces', serif;
}
.ex-given-pill.unknown { background: #fff3ee; border-color: var(--accent); color: var(--accent); }

.ex-input-row { display: flex; align-items: center; gap: 0.55rem; flex-wrap: wrap; }
.ex-input-label { font-family: 'Fraunces', serif; font-size: 1rem; font-weight: 700; white-space: nowrap; }
.ex-input {
  width: 100px; padding: 0.4rem 0.65rem;
  border: 2px solid rgba(26,39,68,0.18); border-radius: 6px;
  font-family: 'DM Sans', sans-serif; font-size: 0.92rem;
  background: #fafaf7; outline: none; transition: border-color 0.15s;
}
.ex-input:focus { border-color: var(--accent); }
.ex-input.correct { border-color: #4a9b6f; background: #f0faf4; }
.ex-input.wrong   { border-color: var(--accent); background: #fff5f2; }
.ex-unit { font-size: 0.82rem; color: var(--muted); font-weight: 500; }
.ex-check-btn {
  padding: 0.4rem 0.9rem; background: var(--navy); color: white;
  border: none; border-radius: 6px; font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: background 0.15s;
}
.ex-check-btn:hover { background: var(--accent); }

.ex-feedback { font-size: 0.8rem; font-weight: 600; margin-top: 0.45rem; min-height: 1.1em; }
.ex-feedback.ok  { color: #4a9b6f; }
.ex-feedback.err { color: var(--accent); }

.ex-show-solution {
  background: none; border: 1.5px solid rgba(26,39,68,0.18); border-radius: 6px;
  padding: 0.3rem 0.75rem; font-size: 0.75rem; font-weight: 600; color: var(--muted);
  cursor: pointer; margin-top: 0.35rem; transition: all 0.15s;
}
.ex-show-solution:hover { border-color: var(--navy); color: var(--navy); }

.ex-solution {
  display: none; background: #f8f5ee;
  border-top: 2px dashed rgba(26,39,68,0.1);
  padding: 0.9rem 1.3rem;
}
.ex-solution.visible { display: block; }
.ex-solution-title {
  font-size: 0.62rem; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: #4a9b6f; margin-bottom: 0.45rem;
}
.ex-steps { font-size: 0.83rem; line-height: 1.8; }

/* step formula (rendered from <sf>…</sf> shorthand) */
.step-formula {
  font-family: 'Fraunces', serif; font-size: 0.92rem; font-weight: 700;
  background: #eae5d8; padding: 0.12rem 0.45rem;
  border-radius: 4px; display: inline-block;
}

/* ─── Responsive ─────────────────────────────────────────────── */
@media (max-width: 640px) {
  .cards { grid-template-columns: 1fr; }
  .ex-body { grid-template-columns: 1fr; }
  .topbar-brand { font-size: 0.9rem; padding: 0 0.8rem; }
  .tab-btn { padding: 0 0.75rem; font-size: 0.78rem; }
}
</style>
</head>
<body>

<!-- ═══ NAV ════════════════════════════════════════════════════ -->
<nav class="topbar">
  <div class="topbar-brand">Mathe<span>·</span>2CD</div>
  <button class="tab-btn active" onclick="switchTab('lernkarten', this)">📚 Lernkarten</button>
  <button class="tab-btn"        onclick="switchTab('uebungen',   this)">✏️ Übungen</button>
  <div class="nav-score" id="nav-score" style="display:none">
    <span id="nav-correct">0</span>/<span id="nav-total">0</span> ✓
  </div>
  <button class="toc-toggle" id="toc-toggle-btn" onclick="toggleToc()">
    <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
      <rect x="1" y="2.5"  width="13" height="1.5" rx=".75" fill="currentColor"/>
      <rect x="1" y="6.75" width="9"  height="1.5" rx=".75" fill="currentColor"/>
      <rect x="1" y="11"   width="11" height="1.5" rx=".75" fill="currentColor"/>
    </svg>
    Inhalt
  </button>
</nav>

<!-- ═══ TOC ════════════════════════════════════════════════════ -->
<aside class="toc-sidebar" id="toc-sidebar">
  <div class="toc-head">Inhaltsverzeichnis</div>
  <div id="toc-inner"></div>
</aside>

<!-- ═══ LERNKARTEN PAGE ════════════════════════════════════════ -->
<div class="page active" id="page-lernkarten">
  <div class="page-inner">
    <div class="page-header">
      <div class="badge">3. Schriftliche Arbeit · 19.3.2026</div>
      <h2>Lern<span>karten</span></h2>
      <p>Karte anklicken zum Umdrehen &nbsp;·&nbsp;
         <span id="flip-count">0</span> von <span id="total-count">0</span> gesehen</p>
    </div>
    <div id="flashcard-sections"></div>
  </div>
  <div class="progress-strip">
    <span>Fortschritt</span>
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <span id="progress-label">0 %</span>
  </div>
</div>

<!-- ═══ ÜBUNGEN PAGE ═══════════════════════════════════════════ -->
<div class="page" id="page-uebungen">
  <div class="page-inner">
    <div class="page-header">
      <div class="badge">Übungsaufgaben</div>
      <h2>Trapez – <span>Aufgaben</span></h2>
      <p>A = (a + c) / 2 · h &nbsp;·&nbsp; Finde die gesuchte Größe</p>
    </div>
    <div class="ex-score-bar">
      Richtig beantwortet:
      <span class="ex-score-val">
        <span id="ex-correct">0</span> / <span id="ex-total">0</span>
      </span>
    </div>
    <div id="exercise-groups"></div>
  </div>
</div>

<!-- data.js must be loaded before app.js -->
<script src="data.js"></script>
<script>
/* ══════════════════════════════════════════════════════════════
   app.js — inlined for single-file convenience.
   If you prefer a separate file, move everything below into
   app.js and add a script tag for app.js after data.js.
   ══════════════════════════════════════════════════════════════ */

// ─── Shorthand tag expansion ──────────────────────────────────
// <f>…</f>  → formula block in card answers
// <sf>…</sf> → inline formula in exercise steps
function expandTags(html) {
  return html
    .replace(/<f>([\s\S]*?)<\/f>/g,  '<span class="formula">$1</span>')
    .replace(/<sf>([\s\S]*?)<\/sf>/g, '<span class="step-formula">$1</span>');
}

// ─── Tab switching ────────────────────────────────────────────
function switchTab(pageId, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + pageId).classList.add('active');
  btn.classList.add('active');
  document.getElementById('nav-score').style.display =
    pageId === 'uebungen' ? 'inline-block' : 'none';
  const isOpen = document.getElementById('toc-sidebar').classList.contains('open');
  document.querySelectorAll('.page').forEach(p =>
    p.classList.toggle('toc-open', isOpen && p.classList.contains('active')));
  closeToc();
}

// ─── TOC ──────────────────────────────────────────────────────
let tocOpen = false;
function toggleToc() {
  tocOpen = !tocOpen;
  document.getElementById('toc-sidebar').classList.toggle('open', tocOpen);
  document.getElementById('toc-toggle-btn').classList.toggle('open', tocOpen);
  document.querySelectorAll('.page.active').forEach(p =>
    p.classList.toggle('toc-open', tocOpen));
}
function closeToc() {
  tocOpen = false;
  document.getElementById('toc-sidebar').classList.remove('open');
  document.getElementById('toc-toggle-btn').classList.remove('open');
  document.querySelectorAll('.page').forEach(p => p.classList.remove('toc-open'));
}
function jumpTo(pageId, anchorId) {
  const btn = [...document.querySelectorAll('.tab-btn')]
    .find(b => b.getAttribute('onclick').includes(pageId));
  if (btn) switchTab(pageId, btn);
  setTimeout(() => {
    const el = document.getElementById(anchorId);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 80);
}

// ─── Build TOC from data ──────────────────────────────────────
function buildToc() {
  const toc = document.getElementById('toc-inner');

  // Lernkarten group
  toc.innerHTML += `<div class="toc-group-label">
    <div class="toc-dot" style="background:#4a9b6f"></div>Lernkarten</div>`;
  FLASHCARD_SECTIONS.forEach(sec => {
    toc.innerHTML += `<button class="toc-item"
      onclick="jumpTo('lernkarten','${sec.id}')">${sec.label}</button>`;
  });

  // Übungen group
  toc.innerHTML += `<div class="toc-group-label" style="margin-top:.5rem">
    <div class="toc-dot" style="background:#e8522a"></div>Übungen – Trapez</div>`;
  let exNum = 1;
  EXERCISE_GROUPS.forEach(grp => {
    const last = exNum + grp.exercises.length - 1;
    toc.innerHTML += `<button class="toc-item"
      onclick="jumpTo('uebungen','${grp.id}')">${grp.label.split('–')[0].trim()} (${exNum}–${last})</button>`;
    exNum = last + 1;
  });
}

// ─── Build flashcard sections ─────────────────────────────────
let flippedSet = new Set(), totalCards = 0;

function buildFlashcards() {
  const container = document.getElementById('flashcard-sections');

  FLASHCARD_SECTIONS.forEach(sec => {
    const section = document.createElement('div');
    section.className = 'fc-section';
    section.id = sec.id;
    section.innerHTML = `
      <div class="section-title">
        <div class="dot" style="background:${sec.color}"></div>${sec.label}
      </div>
      <div class="cards" id="cards-${sec.id}"></div>`;
    container.appendChild(section);

    const grid = section.querySelector('.cards');

    sec.cards.forEach((card, i) => {
      const id = `${sec.id}-${i}`;
      totalCards++;
      const wrap = document.createElement('div');
      wrap.className = 'card-wrap';
      wrap.dataset.id = id;

      // Inject per-section colours as inline CSS vars
      wrap.innerHTML = `
        <div class="card-inner">
          <div class="card-front" style="background:${sec.cardColor}">
            <div class="card-tag">${sec.label}</div>
            <div class="card-question">${card.q}</div>
            <div class="card-hint">↩ zum Umdrehen</div>
          </div>
          <div class="card-back">
            <div class="card-answer-label" style="color:${sec.color}">Antwort</div>
            <div class="card-answer">${expandTags(card.a)}</div>
          </div>
        </div>`;

      // Style formula border colour to match section
      wrap.querySelectorAll('.formula').forEach(f => {
        f.style.borderLeftColor = sec.color;
      });

      wrap.addEventListener('click', () => {
        wrap.classList.toggle('flipped');
        const front = wrap.querySelector('.card-front');
        const back  = wrap.querySelector('.card-back');
        if (wrap.classList.contains('flipped')) {
          const backH = back.scrollHeight, frontH = front.offsetHeight;
          wrap.querySelector('.card-inner').style.minHeight =
            Math.max(frontH, backH) + 'px';
          flippedSet.add(id);
        } else {
          wrap.querySelector('.card-inner').style.minHeight = '';
          flippedSet.delete(id);
        }
        updateProgress();
      });

      grid.appendChild(wrap);
    });
  });

  document.getElementById('total-count').textContent = totalCards;
}

function updateProgress() {
  const pct = Math.round((flippedSet.size / totalCards) * 100);
  document.getElementById('flip-count').textContent = flippedSet.size;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = pct + ' %';
}

// ─── Build exercises ──────────────────────────────────────────
let exCorrect = 0, globalExIndex = 0;

function drawTrapez(a, c, find, W=200, H=120) {
  const pad=28, baseY=H-22, topY=22;
  const baseW=W-pad*2;
  const ratio = Math.min(Math.max(c/a, 0.2), 0.95);
  const topW=baseW*ratio;
  const topX=pad+(baseW-topW)/2;
  const hX=pad+baseW/2+10;
  const hl = v => v===find ? '#e8522a' : '#f5f0e8';
  const hls= v => v===find ? '#e8522a' : '#8899bb';
  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    <polygon points="${pad},${baseY} ${pad+baseW},${baseY} ${topX+topW},${topY} ${topX},${topY}"
      fill="rgba(74,155,111,0.08)" stroke="#4a9b6f" stroke-width="2" stroke-linejoin="round"/>
    <line x1="${hX}" y1="${baseY}" x2="${hX}" y2="${topY}"
      stroke="${hls('h')}" stroke-width="1.5" stroke-dasharray="4,3"/>
    <line x1="${hX-4}" y1="${baseY}" x2="${hX+4}" y2="${baseY}" stroke="${hls('h')}" stroke-width="1.5"/>
    <line x1="${hX-4}" y1="${topY}"  x2="${hX+4}" y2="${topY}"  stroke="${hls('h')}" stroke-width="1.5"/>
    <text x="${pad+baseW/2}" y="${baseY+16}" text-anchor="middle"
      font-family="Fraunces,serif" font-size="13" font-weight="700" fill="${hl('a')}">a</text>
    <text x="${topX+topW/2}" y="${topY-7}" text-anchor="middle"
      font-family="Fraunces,serif" font-size="13" font-weight="700" fill="${hl('c')}">c</text>
    <text x="${hX+10}" y="${(baseY+topY)/2+5}" text-anchor="start"
      font-family="Fraunces,serif" font-size="13" font-weight="700" fill="${hl('h')}">h</text>
  </svg>`;
}

function fmtV(v) { return Number.isInteger(v) ? String(v) : String(v).replace('.', ','); }

function buildExercises() {
  const container = document.getElementById('exercise-groups');
  const allVars = ['a','c','h','A'];
  const units   = { a:'cm', c:'cm', h:'cm', A:'cm²' };
  let totalEx = 0;

  EXERCISE_GROUPS.forEach(grp => {
    const groupEl = document.createElement('div');
    groupEl.id = grp.id;
    groupEl.innerHTML = `<div class="section-title" style="margin-bottom:1rem">
      <div class="dot" style="background:${grp.color}"></div>${grp.label}</div>`;
    container.appendChild(groupEl);

    grp.exercises.forEach(ex => {
      const idx = globalExIndex++;
      totalEx++;

      let pillsHTML = '';
      allVars.forEach(v => {
        if (v === ex.find) {
          pillsHTML += `<span class="ex-given-pill unknown">${v} = ? ${units[v]}</span>`;
        } else if (ex[v] !== undefined) {
          pillsHTML += `<span class="ex-given-pill">${v} = ${fmtV(ex[v])} ${units[v]}</span>`;
        }
      });

      const svgA = ex.a || 12, svgC = ex.c || 6;
      const stepsHTML = ex.steps.map(s => `<div>▸ ${expandTags(s)}</div>`).join('');

      const card = document.createElement('div');
      card.className = 'ex-card';
      card.innerHTML = `
        <div class="ex-header">
          <div class="ex-num">${idx+1}</div>
          <div class="ex-title">Aufgabe ${idx+1} – ${ex.label}</div>
          <div class="ex-find">${ex.find} gesucht</div>
        </div>
        <div class="ex-body">
          <div class="ex-diagram">${drawTrapez(svgA, svgC, ex.find)}</div>
          <div>
            <div class="ex-givens">${pillsHTML}</div>
            <div class="ex-input-row">
              <span class="ex-input-label">${ex.find} =</span>
              <input class="ex-input" type="text" inputmode="decimal"
                placeholder="?" id="input-${idx}">
              <span class="ex-unit">${ex.unit}</span>
              <button class="ex-check-btn" onclick="checkAnswer(${idx})">Prüfen</button>
            </div>
            <div class="ex-feedback" id="feedback-${idx}"></div>
            <button class="ex-show-solution" id="sol-btn-${idx}"
              onclick="toggleSolution(${idx})">Lösung anzeigen</button>
          </div>
        </div>
        <div class="ex-solution" id="solution-${idx}">
          <div class="ex-solution-title">Lösungsweg</div>
          <div class="ex-steps">${stepsHTML}</div>
        </div>`;

      groupEl.appendChild(card);
    });
  });

  document.getElementById('ex-total').textContent  = totalEx;
  document.getElementById('nav-total').textContent = totalEx;
}

// Flatten all exercises into a lookup array for checkAnswer
const _allExercises = [];
EXERCISE_GROUPS.forEach(grp => grp.exercises.forEach(ex => _allExercises.push(ex)));

function checkAnswer(idx) {
  const ex = _allExercises[idx];
  const input    = document.getElementById(`input-${idx}`);
  const feedback = document.getElementById(`feedback-${idx}`);
  const val = parseFloat(input.value.trim().replace(',', '.'));

  if (isNaN(val)) {
    feedback.textContent = 'Bitte eine Zahl eingeben.';
    feedback.className = 'ex-feedback err';
    return;
  }
  if (Math.abs(val - ex[ex.find]) <= 0.05) {
    input.className = 'ex-input correct';
    feedback.textContent = `✓ Richtig! ${ex.find} = ${fmtV(ex[ex.find])} ${ex.unit}`;
    feedback.className = 'ex-feedback ok';
    document.getElementById(`solution-${idx}`).classList.add('visible');
    if (!input.dataset.counted) {
      input.dataset.counted = '1';
      exCorrect++;
      document.getElementById('ex-correct').textContent  = exCorrect;
      document.getElementById('nav-correct').textContent = exCorrect;
    }
  } else {
    input.className = 'ex-input wrong';
    feedback.textContent = `✗ Nicht ganz – versuch's nochmal!`;
    feedback.className = 'ex-feedback err';
  }
}

function toggleSolution(idx) {
  const sol = document.getElementById(`solution-${idx}`);
  const btn = document.getElementById(`sol-btn-${idx}`);
  sol.classList.toggle('visible');
  btn.textContent = sol.classList.contains('visible') ? 'Lösung ausblenden' : 'Lösung anzeigen';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.target.classList.contains('ex-input')) {
    checkAnswer(parseInt(e.target.id.replace('input-', '')));
  }
});

// ─── Init ─────────────────────────────────────────────────────
buildToc();
buildFlashcards();
buildExercises();
</script>
</body>
</html>
