<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schularbeiten – Lernkarten & Übungen</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared/style.css">
</head>
<body>

<nav class="topbar">
  <div class="topbar-brand">Lern<span>·</span>App</div>
</nav>

<div class="landing-header">
  <h1>Schul<span>arbeiten</span></h1>
  <p>Lernkarten &amp; Übungsaufgaben – wähle eine SA</p>
</div>

<div class="sa-grid" id="sa-grid"></div>

<script src="sa/registry.js"></script>
<script>
(function() {
  const grid = document.getElementById('sa-grid');
  const today = new Date().toISOString().slice(0, 10);

  // Sort: upcoming first (by date desc), then past
  const sorted = [...SA_REGISTRY].sort((a, b) => {
    const aFuture = a.date >= today;
    const bFuture = b.date >= today;
    if (aFuture !== bFuture) return aFuture ? -1 : 1;
    return aFuture ? a.date.localeCompare(b.date) : b.date.localeCompare(a.date);
  });

  sorted.forEach(sa => {
    const dateObj = new Date(sa.date + 'T00:00:00');
    const dateStr = dateObj.toLocaleDateString('de-AT', {
      day: 'numeric', month: 'long', year: 'numeric'
    });

    const topicPills = sa.topics
      .map(t => `<span class="sa-topic-pill">${t}</span>`)
      .join('');

    const card = document.createElement('a');
    card.className = 'sa-card';
    card.href = 'app?sa=' + encodeURIComponent(sa.id);
    card.innerHTML = `
      <div class="sa-card-head" style="border-left: 4px solid ${sa.color}">
        <div class="sa-card-subject" style="color:${sa.color}">${sa.subject}</div>
        <div class="sa-card-title">${sa.title}</div>
        <div class="sa-card-date">${dateStr}</div>
      </div>
      <div class="sa-card-body">
        <div class="sa-card-topics">${topicPills}</div>
      </div>`;
    grid.appendChild(card);
  });
})();
</script>
</body>
</html>
